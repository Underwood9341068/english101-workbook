<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENGLISH101 · 모의고사 워크북 생성기</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
:root {
  --blue:#2E75B6; --ltblue:#DEEAF1; --green:#375623;
  --white:#fff; --gray:#f4f6fb; --text:#2d3748;
  --border:#dce8f5; --shadow:0 2px 16px rgba(46,117,182,.10);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Malgun Gothic,sans-serif;background:var(--gray);color:var(--text);min-height:100vh}

/* ── Header ── */
header{background:var(--blue);color:#fff;padding:14px 28px;display:flex;align-items:center;gap:14px;box-shadow:0 3px 10px rgba(0,0,0,.18)}
.logo{font-size:1.5rem;font-weight:800;letter-spacing:.04em}
.logo span{opacity:.6;font-weight:400;font-size:.85rem;margin-left:10px}

/* ── Container ── */
.wrap{max-width:820px;margin:32px auto;padding:0 16px}

/* ── Step bar ── */
.steps{display:flex;align-items:center;justify-content:center;margin-bottom:30px;gap:0}
.snum{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;border:2.5px solid var(--blue);color:var(--blue);background:#fff;transition:.25s;flex-shrink:0;z-index:1}
.snum.on{background:var(--blue);color:#fff}
.snum.done{background:var(--blue);color:#fff;opacity:.55}
.sline{flex:1;max-width:64px;height:2.5px;background:#dce8f5}
.sline.done{background:var(--blue)}

/* ── Card ── */
.card{background:#fff;border-radius:14px;padding:32px 36px;box-shadow:var(--shadow);margin-bottom:24px}
.card h2{color:var(--blue);font-size:1.15rem;margin-bottom:6px}
.desc{color:#666;font-size:.88rem;line-height:1.6;margin-bottom:22px}

/* ── Input ── */
input[type=text],input[type=password],input[type=number]{padding:10px 14px;border:2px solid #dce8f5;border-radius:8px;font-size:.93rem;outline:none;transition:.2s;font-family:inherit}
input:focus{border-color:var(--blue)}
.full{width:100%}
.row{display:flex;align-items:center;gap:10px;margin:8px 0}
.row label{font-size:.88rem;color:#555;white-space:nowrap}
input[type=number]{width:68px;text-align:center}

/* ── Upload ── */
.upload{border:2.5px dashed #b8cfe8;border-radius:12px;padding:36px 20px;text-align:center;cursor:pointer;transition:.2s;background:#fafcff}
.upload:hover,.upload.drag{border-color:var(--blue);background:var(--ltblue)}
.upload.ok{border-color:#4a9e5c;border-style:solid;background:#f0faf2}
.upload-icon{font-size:2.6rem;margin-bottom:10px}
.upload p{color:#777;font-size:.88rem}
.upload .fname{color:var(--green);font-weight:700;font-size:.95rem;margin-top:6px}
#fileInput{display:none}

/* ── Buttons ── */
.btn{padding:10px 22px;border:none;border-radius:8px;font-size:.93rem;font-weight:700;cursor:pointer;transition:.2s;font-family:inherit}
.btn-pri{background:var(--blue);color:#fff}
.btn-pri:hover{background:#1d5fa8}
.btn-pri:disabled{opacity:.45;cursor:not-allowed}
.btn-sec{background:#fff;color:var(--blue);border:2px solid var(--blue)}
.btn-sec:hover{background:var(--ltblue)}
.flex-end{display:flex;justify-content:flex-end;gap:10px;margin-top:24px}

/* ── Download buttons ── */
.dl-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:20px}
.dl-btn{display:flex;flex-direction:column;align-items:center;gap:5px;padding:18px 10px;border:none;border-radius:10px;cursor:pointer;font-family:inherit;transition:.2s}
.dl-btn .dl-icon{font-size:1.6rem}
.dl-btn .dl-label{font-size:.88rem;font-weight:700}
.dl-btn .dl-sub{font-size:.76rem;opacity:.8}
.dl-workbook{background:var(--blue);color:#fff}
.dl-workbook:hover{background:#1d5fa8}
.dl-vocab{background:var(--green);color:#fff}
.dl-vocab:hover{background:#2d4a1c}

/* ── Progress ── */
.prog-wrap{margin:18px 0}
.prog-bar{height:10px;background:#e5ecf7;border-radius:5px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--blue),#5ba3d9);border-radius:5px;transition:width .5s ease;width:0%}
.prog-txt{text-align:center;font-size:.83rem;color:#777;margin-top:6px}

/* ── Log ── */
.log{background:#1a2236;color:#8ecff0;font-family:'Courier New',monospace;font-size:.77rem;padding:14px 16px;border-radius:8px;max-height:150px;overflow-y:auto;margin:14px 0;line-height:1.7}
.log .ok{color:#7dce8a}
.log .er{color:#f47272}
.log .em{color:#ffd580}

/* ── Info/warn boxes ── */
.info{background:var(--ltblue);border-left:4px solid var(--blue);border-radius:4px;padding:11px 15px;font-size:.84rem;color:#3a5070;margin:14px 0;line-height:1.6}
.warn{background:#fff8e1;border-left:4px solid #f0a500;border-radius:4px;padding:11px 15px;font-size:.84rem;color:#5a4500;margin:14px 0;line-height:1.6}
.success{background:#e8f7ed;border-left:4px solid #4a9e5c;border-radius:4px;padding:11px 15px;font-size:.84rem;color:#1d4d28;margin:14px 0;line-height:1.6}

/* ── Summary table ── */
.summary-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #eef2f8;font-size:.88rem}
.summary-row .k{color:#666}
.summary-row .v{font-weight:700;color:var(--blue)}

/* ── Spinner ── */
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:44px;height:44px;border:5px solid #dce8f5;border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:20px auto}
.processing-msg{text-align:center;color:#666;font-size:.9rem;margin:8px 0}

footer{text-align:center;padding:24px;color:#aaa;font-size:.78rem}
.hidden{display:none}
</style>
</head>
<body>

<header>
  <div class="logo">ENGLISH101 <span>모의고사 워크북 생성기</span></div>
</header>

<div class="wrap">
  <!-- Step indicator -->
  <div class="steps" id="stepBar">
    <div class="snum on" id="s1">1</div><div class="sline" id="l1"></div>
    <div class="snum" id="s2">2</div><div class="sline" id="l2"></div>
    <div class="snum" id="s3">3</div><div class="sline" id="l3"></div>
    <div class="snum" id="s4">4</div>
  </div>

  <div id="app"></div>
</div>

<footer>ENGLISH101 · 모의고사 워크북 자동 생성기 · Powered by Claude AI</footer>

<input type="file" id="fileInput" accept=".pdf">

<script>
// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
const S = {
  step: 1,
  apiKey: localStorage.getItem('e101_key') || '',
  pdfText: '',
  fileName: '',
  startNum: 21,
  endNum: 40,
  data: null,
  logs: []
};

// ══════════════════════════════════════════════
//  STEP INDICATOR
// ══════════════════════════════════════════════
function updateStepBar(n) {
  for (let i = 1; i <= 4; i++) {
    const el = document.getElementById('s' + i);
    el.className = 'snum' + (i === n ? ' on' : i < n ? ' done' : '');
  }
  for (let i = 1; i <= 3; i++) {
    const el = document.getElementById('l' + i);
    el.className = 'sline' + (i < n ? ' done' : '');
  }
}

// ══════════════════════════════════════════════
//  LOG
// ══════════════════════════════════════════════
function log(msg, type = '') {
  S.logs.push({ msg, type });
  const el = document.getElementById('logBox');
  if (el) {
    el.innerHTML = S.logs.map(l =>
      `<div class="log-line ${l.type}">${l.msg}</div>`
    ).join('');
    el.scrollTop = el.scrollHeight;
  }
}

// ══════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════
function render() {
  updateStepBar(S.step);
  const app = document.getElementById('app');
  const steps = {
    1: renderStep1,
    2: renderStep2,
    3: renderStep3,
    4: renderStep4,
  };
  app.innerHTML = (steps[S.step] || (() => ''))();
  bindEvents();
}

// ── Step 1: API Key ──────────────────────────
function renderStep1() {
  return `
  <div class="card">
    <h2>🔑 Step 1 · Claude API 키 입력</h2>
    <p class="desc">
      Anthropic Claude API 키를 입력하세요.<br>
      키는 브라우저 로컬스토리지에만 저장되며 외부로 전송되지 않습니다.
    </p>
    <div class="warn">
      ⚠️ API 키는 <strong>Anthropic Console</strong> (console.anthropic.com) 에서 발급받을 수 있습니다.
      API 사용 요금이 발생합니다 (문서 1개당 약 $0.02~0.05 수준).
    </div>
    <input type="password" class="full" id="apiKeyInput"
      placeholder="sk-ant-api03-..." value="${S.apiKey}">
    <div class="flex-end">
      <button class="btn btn-pri" id="btnStep1">다음 →</button>
    </div>
  </div>`;
}

// ── Step 2: PDF Upload ───────────────────────
function renderStep2() {
  const hasFile = !!S.fileName;
  return `
  <div class="card">
    <h2>📄 Step 2 · 모의고사 PDF 업로드</h2>
    <p class="desc">
      고1 전국연합학력평가 문제지 PDF를 업로드하세요.<br>
      PDF에서 텍스트를 자동으로 추출합니다.
    </p>
    <div class="upload ${hasFile ? 'ok' : ''}" id="dropZone">
      <div class="upload-icon">${hasFile ? '✅' : '📂'}</div>
      ${hasFile
        ? `<p>파일 업로드 완료</p><p class="fname">${S.fileName}</p>`
        : `<p><strong>PDF 파일을 클릭하거나 드래그</strong></p><p>고1 모의고사 문제지 PDF</p>`
      }
    </div>
    <div class="info" style="margin-top:14px">
      ℹ️ 텍스트가 포함된 PDF에서만 추출 가능합니다 (스캔 이미지 PDF 불가).
      한국교육과정평가원, EBSi 공식 PDF를 사용하세요.
    </div>
    <div class="flex-end">
      <button class="btn btn-sec" id="btnBack2">← 이전</button>
      <button class="btn btn-pri" id="btnStep2" ${!hasFile ? 'disabled' : ''}>다음 →</button>
    </div>
  </div>`;
}

// ── Step 3: Settings & Generate ─────────────
function renderStep3() {
  return `
  <div class="card">
    <h2>⚙️ Step 3 · 설정 및 생성</h2>
    <p class="desc">
      워크북으로 만들 문제 번호 범위를 설정하고 생성을 시작하세요.
    </p>
    <div class="summary-row"><span class="k">파일명</span><span class="v">${S.fileName}</span></div>
    <div class="summary-row"><span class="k">추출된 텍스트</span><span class="v">${S.pdfText.length.toLocaleString()} 글자</span></div>
    <div class="row" style="margin-top:16px">
      <label>문제 범위:</label>
      <input type="number" id="numStart" value="${S.startNum}" min="18" max="45"> 번 ~
      <input type="number" id="numEnd" value="${S.endNum}" min="18" max="45"> 번
    </div>
    <div class="info">
      📚 생성 결과물:<br>
      &nbsp; · 문장 해석 워크북 (교사용 + 학생용) — 1문제 1페이지, 굴림 9pt<br>
      &nbsp; · 단어 시험지 (교사용 + 학생용) — 2문제씩 묶어 1페이지, 랜덤 셔플
    </div>
    <div class="prog-wrap hidden" id="progWrap">
      <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
      <div class="prog-txt" id="progTxt">처리 중...</div>
    </div>
    <div class="log hidden" id="logBox"></div>
    <div id="spinWrap" class="hidden">
      <div class="spinner"></div>
      <p class="processing-msg" id="spinMsg">Claude AI가 문제를 분석 중입니다...</p>
    </div>
    <div class="flex-end">
      <button class="btn btn-sec" id="btnBack3">← 이전</button>
      <button class="btn btn-pri" id="btnGenerate">🚀 워크북 생성 시작</button>
    </div>
  </div>`;
}

// ── Step 4: Download ─────────────────────────
function renderStep4() {
  const d = S.data;
  const cnt = d ? d.problems.length : 0;
  const info = d ? d.exam_info : {};
  return `
  <div class="card">
    <h2>✅ 생성 완료!</h2>
    <p class="desc">총 ${cnt}개 문제의 워크북과 단어 시험지가 완성되었습니다.</p>
    <div class="success">
      📋 ${info.year || ''}년 ${info.month || ''}월 ${info.grade || '고1'} 전국연합학력평가 
      | 문제 ${S.startNum}~${S.endNum}번 | ${cnt}문제
    </div>
    <p style="font-weight:700;color:#444;margin-top:20px;margin-bottom:10px">📥 워크북 다운로드</p>
    <div class="dl-grid">
      <button class="dl-btn dl-workbook" id="dlWbTeacher">
        <span class="dl-icon">👨‍🏫</span>
        <span class="dl-label">해석 워크북 교사용</span>
        <span class="dl-sub">정답 포함 · 녹색 해석</span>
      </button>
      <button class="dl-btn dl-workbook" id="dlWbStudent" style="background:#5b9bd5">
        <span class="dl-icon">🎓</span>
        <span class="dl-label">해석 워크북 학생용</span>
        <span class="dl-sub">빈칸 형식 · 필기 가능</span>
      </button>
    </div>
    <p style="font-weight:700;color:#444;margin-top:20px;margin-bottom:10px">📥 단어 시험지 다운로드</p>
    <div class="dl-grid">
      <button class="dl-btn dl-vocab" id="dlVbTeacher">
        <span class="dl-icon">👨‍🏫</span>
        <span class="dl-label">단어 시험지 교사용</span>
        <span class="dl-sub">답지 · 학생용과 동일 순서</span>
      </button>
      <button class="dl-btn dl-vocab" id="dlVbStudent" style="background:#5a9e6a">
        <span class="dl-icon">🎓</span>
        <span class="dl-label">단어 시험지 학생용</span>
        <span class="dl-sub">영어만 표시 · 뜻 빈칸</span>
      </button>
    </div>
    <div class="flex-end" style="margin-top:24px">
      <button class="btn btn-sec" id="btnRestart">🔄 다른 파일 처리</button>
    </div>
  </div>`;
}

// ══════════════════════════════════════════════
//  EVENT BINDING
// ══════════════════════════════════════════════
function bindEvents() {
  // Step 1
  const btn1 = document.getElementById('btnStep1');
  if (btn1) btn1.onclick = () => {
    const key = document.getElementById('apiKeyInput').value.trim();
    if (!key) { alert('API 키를 입력하세요.'); return; }
    S.apiKey = key;
    localStorage.setItem('e101_key', key);
    S.step = 2; render();
  };

  // Step 2
  const back2 = document.getElementById('btnBack2');
  if (back2) back2.onclick = () => { S.step = 1; render(); };

  const dz = document.getElementById('dropZone');
  if (dz) {
    dz.onclick = () => document.getElementById('fileInput').click();
    dz.ondragover = (e) => { e.preventDefault(); dz.classList.add('drag'); };
    dz.ondragleave = () => dz.classList.remove('drag');
    dz.ondrop = (e) => {
      e.preventDefault(); dz.classList.remove('drag');
      handleFile(e.dataTransfer.files[0]);
    };
  }

  document.getElementById('fileInput').onchange = (e) => handleFile(e.target.files[0]);

  const btn2 = document.getElementById('btnStep2');
  if (btn2) btn2.onclick = () => { S.step = 3; render(); };

  // Step 3
  const back3 = document.getElementById('btnBack3');
  if (back3) back3.onclick = () => { S.step = 2; render(); };

  const btnGen = document.getElementById('btnGenerate');
  if (btnGen) btnGen.onclick = async () => {
    S.startNum = parseInt(document.getElementById('numStart').value) || 21;
    S.endNum   = parseInt(document.getElementById('numEnd').value) || 40;
    await runGenerate();
  };

  // Step 4
  const dlWbT  = document.getElementById('dlWbTeacher');
  const dlWbS  = document.getElementById('dlWbStudent');
  const dlVbT  = document.getElementById('dlVbTeacher');
  const dlVbS  = document.getElementById('dlVbStudent');
  const btnRes = document.getElementById('btnRestart');

  if (dlWbT) dlWbT.onclick = async () => {
    try {
      setLoading(dlWbT, true);
      const blob = await generateWorkbookBlob(true);
      download(blob, `${filePrefix()}_해석워크북_교사용.docx`);
    } catch(e) { alert('교사용 워크북 생성 오류:\n' + e.message); }
    finally { setLoading(dlWbT, false); }
  };
  if (dlWbS) dlWbS.onclick = async () => {
    try {
      setLoading(dlWbS, true);
      const blob = await generateWorkbookBlob(false);
      download(blob, `${filePrefix()}_해석워크북_학생용.docx`);
    } catch(e) { alert('학생용 워크북 생성 오류:\n' + e.message); }
    finally { setLoading(dlWbS, false); }
  };
  if (dlVbT) dlVbT.onclick = async () => {
    try {
      setLoading(dlVbT, true);
      const blob = await generateVocabBlob(true);
      download(blob, `${filePrefix()}_단어시험지_교사용.docx`);
    } catch(e) { alert('교사용 단어시험지 생성 오류:\n' + e.message); }
    finally { setLoading(dlVbT, false); }
  };
  if (dlVbS) dlVbS.onclick = async () => {
    try {
      setLoading(dlVbS, true);
      const blob = await generateVocabBlob(false);
      download(blob, `${filePrefix()}_단어시험지_학생용.docx`);
    } catch(e) { alert('학생용 단어시험지 생성 오류:\n' + e.message); }
    finally { setLoading(dlVbS, false); }
  };
  if (btnRes) btnRes.onclick = () => {
    S.step = 2; S.pdfText = ''; S.fileName = ''; S.data = null; S.logs = [];
    render();
  };
}

function setLoading(btn, on) {
  btn.disabled = on;
  if (on) btn.style.opacity = '.6';
  else btn.style.opacity = '1';
}

function filePrefix() {
  const i = S.data ? S.data.exam_info : {};
  return `${i.year||''}년_${i.month||''}월_${i.grade||'고1'}_${S.startNum}-${S.endNum}번`;
}

// ══════════════════════════════════════════════
//  PDF EXTRACTION
// ══════════════════════════════════════════════
async function handleFile(file) {
  if (!file || !file.name.endsWith('.pdf')) { alert('PDF 파일만 업로드 가능합니다.'); return; }
  S.fileName = file.name;

  const progWrap = document.getElementById('progWrap');
  if (progWrap) progWrap.classList.remove('hidden');

  try {
    S.pdfText = await extractPDF(file);
    S.step = 2; render();
  } catch(e) {
    alert('PDF 추출 오류: ' + e.message);
  }
}

async function extractPDF(file) {
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
  let text = '';
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    text += content.items.map(t => t.str).join(' ') + '\n';
  }
  return text;
}

// ══════════════════════════════════════════════
//  CLAUDE API
// ══════════════════════════════════════════════
async function runGenerate() {
  const logBox = document.getElementById('logBox');
  const spinWrap = document.getElementById('spinWrap');
  const btnGen = document.getElementById('btnGenerate');
  const backBtn = document.getElementById('btnBack3');
  const progWrap = document.getElementById('progWrap');

  logBox.classList.remove('hidden');
  spinWrap.classList.remove('hidden');
  progWrap.classList.remove('hidden');
  btnGen.disabled = true;
  backBtn.disabled = true;
  S.logs = [];

  setProgress(10, 'PDF 텍스트 준비 중...');
  log('▶ PDF 텍스트 준비 완료 (' + S.pdfText.length + ' chars)', 'ok');

  setProgress(25, 'Claude AI에 분석 요청 중...');
  log('▶ Claude API 호출 중 (문제 ' + S.startNum + '~' + S.endNum + '번)...', 'em');

  try {
    S.data = await callClaude(S.pdfText, S.startNum, S.endNum);
    setProgress(90, 'docx 파일 생성 중...');
    log('▶ API 응답 수신 완료: ' + S.data.problems.length + '개 문제', 'ok');
    setProgress(100, '완료!');
    log('✅ 모든 파일 생성 준비 완료!', 'ok');
    await sleep(600);
    S.step = 4; render();
  } catch(e) {
    log('❌ 오류: ' + e.message, 'er');
    spinWrap.classList.add('hidden');
    btnGen.disabled = false;
    backBtn.disabled = false;
    alert('오류 발생: ' + e.message);
  }
}

function setProgress(pct, txt) {
  const fill = document.getElementById('progFill');
  const label = document.getElementById('progTxt');
  const spinMsg = document.getElementById('spinMsg');
  if (fill) fill.style.width = pct + '%';
  if (label) label.textContent = txt;
  if (spinMsg) spinMsg.textContent = txt;
}

async function callClaude(text, startN, endN) {
  const prompt = `You are an expert Korean high school English teacher.

Analyze this Korean 고1 모의고사 (Grade 10 national practice exam) text.
Extract reading comprehension problems numbered ${startN} through ${endN}.

For EACH problem return:
- num: problem number (integer)
- type: problem type in Korean. Use these exact strings based on context:
  "밑줄 의미", "밑줄 의미 [3점]", "요지", "주제", "제목", "제목 [3점]",
  "어법 [3점]", "문맥상 어휘", "문맥상 어휘 [3점]",
  "빈칸 추론", "빈칸 추론 [3점]",
  "무관한 문장", "글의 순서", "글의 순서 [3점]",
  "문장 삽입", "문장 삽입 [3점]", "요약문 완성"
- sentences: ALL sentences from the passage in sequential order.
  Each: {"en": "exact English text", "kr": "accurate Korean translation"}
  For 어법 problems: add [→ correction] note in the kr field where applicable.
  For 무관한 문장: mark the irrelevant sentence in kr with "[무관 문장]".
  For 글의 순서/문장 삽입: include (A)(B)(C) labels or [삽입] labels.
- vocab: 8–14 educationally important vocabulary items (NOT basic words).
  Each: {"en": "word or phrase", "kr": "Korean meaning"}
  For 빈칸 problems: include the answer with "(빈칸 정답)" note.
  For 어법/어휘 problems: include the corrected form with "(정답)" note.

Return ONLY valid JSON (no markdown, no explanation):
{
  "exam_info": {"year": "YYYY", "month": "M", "grade": "고1"},
  "problems": [ { "num": N, "type": "...", "sentences": [...], "vocab": [...] } ]
}

Exam text:
${text.substring(0, 12000)}`;

  // Anthropic 공식 SDK 사용 (CORS 문제 해결)
  const { default: Anthropic } = await import('https://esm.sh/@anthropic-ai/sdk@0.36.3');
  const client = new Anthropic({ apiKey: S.apiKey, dangerouslyAllowBrowser: true });

  const response = await client.messages.create({
    model: 'claude-sonnet-4-6',
    max_tokens: 16000,
    messages: [{ role: 'user', content: prompt }]
  });

  const raw = response.content?.[0]?.text || '';

  // JSON 파싱 (마크다운 코드블록 제거)
  const clean = raw.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();
  try {
    return JSON.parse(clean);
  } catch(e) {
    // JSON 시작/끝 찾기
    const start = clean.indexOf('{');
    const end = clean.lastIndexOf('}');
    if (start >= 0 && end > start) {
      return JSON.parse(clean.substring(start, end + 1));
    }
    throw new Error('JSON 파싱 실패: ' + e.message);
  }
}

// ── docx 동적 로딩 (esm.sh) ──
let _docxLoaded = false;
async function loadDocx() {
  if (_docxLoaded) return;
  const mod = await import('https://esm.sh/docx@9.6.1');
  window.docx = mod;
  _docxLoaded = true;
}

// ══════════════════════════════════════════════
//  DOCX GENERATION
// ══════════════════════════════════════════════
const FONT  = 'Gulim';
const SZ_T  = 18;   // 9pt teacher
const SZ_S  = 16;   // 8pt student

const PAGE_W = 11906, PAGE_H = 16838;
const MT = 1417, MB = 1417, ML = 1134, MR = 1134;
const CW = PAGE_W - ML - MR; // 9638

// Workbook - teacher
const T_WNO = 420, T_WEN = 5380, T_WKR = CW - T_WNO - T_WEN;
// Workbook - student (EN = KR)
const S_WNO = 420;
const S_WEN = Math.floor((CW - S_WNO) / 2);
const S_WKR = CW - S_WNO - S_WEN;
// Vocab sheet
const HALF_V = Math.floor(CW / 2);
const WNO_V  = 360, WEN_V = 2780, WKR_V = HALF_V - WNO_V - WEN_V;

const C = {
  BLUE:'2E75B6', LTBLUE:'DEEAF1', GREEN:'375623',
  WHITE:'FFFFFF', GRAY:'F2F2F2'
};

function getBorders() {
  const b = { style: window.docx.BorderStyle.SINGLE, size: 4, color: 'AAAAAA' };
  return { top: b, bottom: b, left: b, right: b };
}

const SP0 = { before: 0, after: 0 };
const MAR_T = { top: 35, bottom: 35, left: 80, right: 80 };
const MAR_S = { top: 40, bottom: 40, left: 80, right: 80 };
const MAR_V = { top: 55, bottom: 55, left: 90, right: 90 };

function mCell(text, w, sz, mar, { bg = C.WHITE, color = '000000', bold = false, center = false } = {}) {
  const { TableCell, Paragraph, TextRun, WidthType, ShadingType, VerticalAlign, AlignmentType } = window.docx;
  return new TableCell({
    width: { size: w, type: WidthType.DXA },
    borders: getBorders(),
    shading: { fill: bg, type: ShadingType.CLEAR },
    margins: mar,
    verticalAlign: VerticalAlign.CENTER,
    children: [new Paragraph({
      alignment: center ? AlignmentType.CENTER : AlignmentType.LEFT,
      spacing: SP0,
      children: [new TextRun({ text: String(text || ''), font: FONT, size: sz, color, bold })]
    })]
  });
}

function mHdr(text, w, sz, mar) {
  return mCell(text, w, sz, mar, { bg: C.BLUE, color: C.WHITE, bold: true, center: true });
}

function mBlank(w, mar) {
  const { TableCell, Paragraph, WidthType, ShadingType, VerticalAlign } = window.docx;
  return new TableCell({
    width: { size: w, type: WidthType.DXA },
    borders: getBorders(),
    shading: { fill: C.GRAY, type: ShadingType.CLEAR },
    margins: mar,
    verticalAlign: VerticalAlign.TOP,
    children: [new Paragraph({ children: [], spacing: SP0 })]
  });
}

// ── Calc row height for student workbook ──
function calcRowH(sentCount, vocabCount, isFirst) {
  const USABLE  = PAGE_H - MT - MB - 500;
  const USABLE1 = USABLE - 340;
  const usable  = isFirst ? USABLE1 : USABLE;
  const FIXED   = 1700;
  const vRows   = Math.ceil(vocabCount / 2);
  const vocabH  = 340 + vRows * 300;
  const avail   = usable - FIXED - 340 - vocabH;
  return Math.max(Math.floor(avail / sentCount), 800);
}

// ── Sentence table ──
function makeSentTable(sentences, isTeacher, rowH) {
  const { Table, TableRow, WidthType, HeightRule } = window.docx;
  const sz  = isTeacher ? SZ_T : SZ_S;
  const mar = isTeacher ? MAR_T : MAR_S;
  const wno = isTeacher ? T_WNO : S_WNO;
  const wen = isTeacher ? T_WEN : S_WEN;
  const wkr = isTeacher ? T_WKR : S_WKR;

  const hdr = new TableRow({ children: [
    mHdr('No.', wno, sz, mar),
    mHdr('영어 원문', wen, sz, mar),
    mHdr('한국어 해석', wkr, sz, mar),
  ]});

  const rows = sentences.map((s, i) => {
    const bg = i % 2 === 1 ? C.LTBLUE : C.WHITE;
    const opts = (!isTeacher && rowH) ? { height: { value: rowH, rule: (window.docx.HeightRule || {}).AT_LEAST || 'atLeast' } } : {};
    return new TableRow({
      ...opts,
      children: [
        mCell(String(i + 1), wno, sz, mar, { bg, bold: true, center: true }),
        mCell(s.en, wen, sz, mar, { bg }),
        isTeacher ? mCell(s.kr, wkr, sz, mar, { bg, color: C.GREEN }) : mBlank(wkr, mar),
      ]
    });
  });

  return new Table({ width: { size: CW, type: WidthType.DXA }, columnWidths: [wno, wen, wkr], rows: [hdr, ...rows] });
}

// ── Vocab table (workbook) ──
function makeVocabTable(vocab, isTeacher) {
  const { Table, TableRow, WidthType } = window.docx;
  const sz  = isTeacher ? SZ_T : SZ_S;
  const mar = isTeacher ? MAR_T : MAR_S;
  const WVE = 2620, WVK = Math.floor(CW / 2) - 2620;

  const hdr = new TableRow({ children: [
    mHdr('영어 단어 / 표현', WVE, sz, mar),
    mHdr('한글 뜻', WVK, sz, mar),
    mHdr('영어 단어 / 표현', WVE, sz, mar),
    mHdr('한글 뜻', WVK, sz, mar),
  ]});

  const rows = [];
  for (let i = 0; i < vocab.length; i += 2) {
    const bg = Math.floor(i / 2) % 2 === 1 ? C.LTBLUE : C.WHITE;
    const [e1, k1] = [vocab[i].en, vocab[i].kr];
    const [e2, k2] = vocab[i + 1] ? [vocab[i + 1].en, vocab[i + 1].kr] : ['', ''];
    rows.push(new TableRow({ children: [
      mCell(e1, WVE, sz, mar, { bg, bold: true }),
      isTeacher ? mCell(k1, WVK, sz, mar, { bg, color: C.GREEN }) : mBlank(WVK, mar),
      mCell(e2, WVE, sz, mar, { bg, bold: !!e2 }),
      isTeacher ? mCell(k2, WVK, sz, mar, { bg, color: C.GREEN }) : mBlank(WVK, mar),
    ]}));
  }
  return new Table({ width: { size: CW, type: WidthType.DXA }, columnWidths: [WVE, WVK, WVE, WVK], rows: [hdr, ...rows] });
}

// ── Vocab test sheet table ──
function makeVocabSheetTable(label, vocab, isTeacher) {
  const { Table, TableRow, TableCell, Paragraph, TextRun, WidthType, ShadingType, VerticalAlign, AlignmentType } = window.docx;
  const total = vocab.length;
  const half  = Math.ceil(total / 2);

  const titleRow = new TableRow({ children: [
    new TableCell({
      columnSpan: 6,
      width: { size: CW, type: WidthType.DXA },
      borders: getBorders(),
      shading: { fill: C.BLUE, type: ShadingType.CLEAR },
      margins: MAR_V,
      verticalAlign: VerticalAlign.CENTER,
      children: [new Paragraph({
        alignment: AlignmentType.CENTER, spacing: SP0,
        children: [new TextRun({
          text: `${label}  총 ${total}개  ${isTeacher ? '[교사용 답지]' : '[학생용]'}`,
          font: FONT, size: SZ_T, color: C.WHITE, bold: true
        })]
      })]
    })
  ]});

  const hdr = new TableRow({ children: [
    mHdr('No.', WNO_V, SZ_T, MAR_V),
    mHdr('영어 단어 / 표현', WEN_V, SZ_T, MAR_V),
    mHdr('한글 뜻', WKR_V, SZ_T, MAR_V),
    mHdr('No.', WNO_V, SZ_T, MAR_V),
    mHdr('영어 단어 / 표현', WEN_V, SZ_T, MAR_V),
    mHdr('한글 뜻', WKR_V, SZ_T, MAR_V),
  ]});

  const rows = [];
  for (let i = 0; i < half; i++) {
    const bg = i % 2 === 1 ? C.LTBLUE : C.WHITE;
    const { en: e1, kr: k1 } = vocab[i];
    const j = i + half;
    const { en: e2, kr: k2 } = j < total ? vocab[j] : { en: '', kr: '' };
    rows.push(new TableRow({ children: [
      mCell(String(i + 1), WNO_V, SZ_T, MAR_V, { bg, bold: true, center: true }),
      mCell(e1, WEN_V, SZ_T, MAR_V, { bg, bold: true }),
      isTeacher ? mCell(k1, WKR_V, SZ_T, MAR_V, { bg, color: C.GREEN }) : mBlank(WKR_V, MAR_V),
      mCell(e2 ? String(j + 1) : '', WNO_V, SZ_T, MAR_V, { bg, bold: !!e2, center: true }),
      mCell(e2, WEN_V, SZ_T, MAR_V, { bg, bold: !!e2 }),
      isTeacher ? mCell(k2, WKR_V, SZ_T, MAR_V, { bg, color: C.GREEN }) : mBlank(WKR_V, MAR_V),
    ]}));
  }
  return new Table({ width: { size: CW, type: WidthType.DXA }, columnWidths: [WNO_V, WEN_V, WKR_V, WNO_V, WEN_V, WKR_V], rows: [titleRow, hdr, ...rows] });
}

// ── Footer ──
function makeFooter(label) {
  const { Footer, Paragraph, TextRun, TabStopType, PageNumber } = window.docx;
  return new Footer({ children: [new Paragraph({
    children: [
      new TextRun({ text: '\t', font: FONT }),
      new TextRun({ text: 'ENGLISH101', font: FONT, size: 16, bold: true, color: C.BLUE }),
      new TextRun({ text: `  |  ${label}`, font: FONT, size: 16 }),
      new TextRun({ text: '\t', font: FONT }),
      new TextRun({ children: [PageNumber.CURRENT], font: FONT, size: 16 }),
    ],
    tabStops: [
      { type: TabStopType.CENTER, position: Math.floor(CW / 2) },
      { type: TabStopType.RIGHT,  position: CW },
    ]
  })]});
}

// ── Fisher-Yates shuffle ──
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ── WORKBOOK ──
async function generateWorkbookBlob(isTeacher) {
  await loadDocx();
  const { Document, Packer, Paragraph, TextRun, WidthType, PageBreak } = window.docx;
  const d = S.data;
  const info = d.exam_info;
  const children = [];

  d.problems.forEach((p, idx) => {
    if (idx > 0) children.push(new Paragraph({ children: [new PageBreak()], spacing: SP0 }));

    // Title (first page only)
    if (idx === 0) children.push(new Paragraph({
      children: [new TextRun({
        text: `${info.year}학년도 ${info.month}월 ${info.grade} 전국연합학력평가 영어 영역  |  ${S.startNum}~${S.endNum}번  |  【${isTeacher ? '교사용 | 정답 포함' : '학생용'}】`,
        font: FONT, size: SZ_T + 2, bold: true, color: C.BLUE
      })],
      spacing: { before: 0, after: 120 }
    }));

    // Problem header
    children.push(new Paragraph({
      children: [
        new TextRun({ text: `${p.num}번  `, font: FONT, size: (isTeacher ? SZ_T : SZ_S) + 4, bold: true }),
        new TextRun({ text: `[${p.type}]`, font: FONT, size: isTeacher ? SZ_T : SZ_S, color: '444444' })
      ],
      spacing: { before: idx === 0 ? 60 : 0, after: 50 }
    }));

    // Sentence section
    children.push(new Paragraph({
      children: [new TextRun({ text: `▶ 문장 해석  (총 ${p.sentences.length}문장)`, font: FONT, size: isTeacher ? SZ_T : SZ_S, bold: true, color: C.BLUE })],
      spacing: { before: 30, after: 30 }
    }));

    const rowH = !isTeacher ? calcRowH(p.sentences.length, p.vocab.length, idx === 0) : null;
    children.push(makeSentTable(p.sentences, isTeacher, rowH));

    // Vocab section
    children.push(new Paragraph({
      children: [new TextRun({ text: `▶ 핵심 단어 · 표현  (총 ${p.vocab.length}개)`, font: FONT, size: isTeacher ? SZ_T : SZ_S, bold: true, color: C.BLUE })],
      spacing: { before: 70, after: 30 }
    }));
    children.push(makeVocabTable(p.vocab, isTeacher));
  });

  const examLabel = `${info.year}학년도 ${info.month}월 ${info.grade} 단어 시험지  |  ${isTeacher ? '[교사용]' : '[학생용]'}`;
  const doc = new Document({
    styles: { default: { document: { run: { font: FONT, size: SZ_T } } } },
    sections: [{
      properties: { page: { size: { width: PAGE_W, height: PAGE_H }, margin: { top: MT, bottom: MB, left: ML, right: MR } } },
      footers: { default: makeFooter(examLabel) },
      children
    }]
  });
  return await Packer.toBlob(doc);
}

// ── VOCAB SHEET ──
async function generateVocabBlob(isTeacher) {
  await loadDocx();
  const { Document, Packer, Paragraph, PageBreak } = window.docx;
  const d = S.data;
  const info = d.exam_info;

  // Group problems 2 per sheet, pre-shuffle vocab per group
  const groups = [];
  for (let i = 0; i < d.problems.length; i += 2) {
    const p1 = d.problems[i];
    const p2 = d.problems[i + 1];
    const combined = [...p1.vocab, ...(p2 ? p2.vocab : [])];
    const shuffled = shuffle(combined);
    const nums = p2 ? `${p1.num}번 ~ ${p2.num}번` : `${p1.num}번`;
    groups.push({ label: `단어 시험지  [${nums}]`, vocab: shuffled });
  }

  const children = [];
  groups.forEach((g, idx) => {
    if (idx > 0 && idx % 2 === 0) {
      children.push(new Paragraph({ children: [new PageBreak()], spacing: SP0 }));
    } else if (idx > 0) {
      children.push(new Paragraph({ spacing: { before: 160, after: 0 }, children: [] }));
    }
    children.push(makeVocabSheetTable(g.label, g.vocab, isTeacher));
  });

  const examLabel = `${info.year}학년도 ${info.month}월 ${info.grade} 단어 시험지  |  ${isTeacher ? '[교사용 답지]' : '[학생용]'}`;
  const doc = new Document({
    styles: { default: { document: { run: { font: FONT, size: SZ_T } } } },
    sections: [{
      properties: { page: { size: { width: PAGE_W, height: PAGE_H }, margin: { top: MT, bottom: MB, left: ML, right: MR } } },
      footers: { default: makeFooter(examLabel) },
      children
    }]
  });
  return await Packer.toBlob(doc);
}

// ── Download helper ──
function download(blob, name) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = name;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
